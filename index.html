<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>良家导航-服务上门私人家用有范的导航网站</title>
    <meta name="description" content="良家导航 - 不求最全，但求好用。精选优质网站导航，包含软件工具、影视资源、社区资讯等分类。">
    <meta name="keywords" content="良家导航,网站导航,软件工具,影视资源,社区资讯">
    <link rel="icon" href="ico.ico" type="image/x-icon">
    <link rel="shortcut icon" href="ico.ico" type="image/x-icon">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Helvetica Neue',Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#e8ecef 0%,#dde1e5 50%,#cfd3d7 100%);min-height:100vh;color:#2d3748}
        .sidebar{position:fixed;left:0;top:0;width:60px;height:100vh;background:rgba(245,247,250,0.95);display:flex;flex-direction:column;align-items:center;padding-top:15px;z-index:1000;border-right:1px solid #c0c4c9}
        .sidebar-logo{margin-bottom:20px}
        .sidebar-logo img{width:48px;height:48px;border-radius:8px}
        .sidebar-nav{display:flex;flex-direction:column;justify-content:space-between;flex:1;padding-bottom:15px}
        .nav-top,.nav-bottom-wrapper{display:flex;flex-direction:column;gap:12px}
        .nav-item{display:flex;flex-direction:column;align-items:center;color:#64748b;text-decoration:none;padding:8px 4px;border-radius:8px;transition:all .3s ease;width:44px}
        .nav-item:hover{background:#e0f2fe;color:#3b82f6}
        .nav-item.active{background:#dbeafe;color:#2563eb}
        .nav-icon{font-size:20px;margin-bottom:2px}
        .nav-text{font-size:10px}
        .main-content{margin-left:60px}
        .header{display:flex;align-items:center;justify-content:space-between;padding:15px 25px;background:transparent}
        .header-left{display:flex;align-items:center;gap:15px}
        .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer}
        .logo-text{font-size:26px;font-weight:700;color:#3b82f6;text-decoration:none;line-height:48px}
        .theme-toggle{background:none;border:none;font-size:24px;cursor:pointer;padding:5px;border-radius:6px;transition:all .3s ease}
        .theme-toggle:hover{background:rgba(0,0,0,.05)}
        .hero-section{padding:20px 25px;text-align:center}
        .quick-tabs{display:flex;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .quick-tabs .tab{padding:8px 20px;border:none;border-radius:20px;font-size:14px;background:rgba(255,255,255,.95);color:#64748b;cursor:pointer;transition:all .3s ease;text-decoration:none}
        .quick-tabs .tab:hover,.quick-tabs .tab.active{background:#3b82f6;color:#fff}
        .search-box{display:flex;justify-content:center;align-items:center;margin-bottom:15px}
        .search-input{width:550px;height:44px;padding:0 20px;border:none;border-radius:22px 0 0 22px;font-size:15px;outline:none;background:rgba(255,255,255,.97);color:#2d3748}
        .search-btn{height:44px;padding:0 22px;border:none;border-radius:0 22px 22px 0;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);color:#fff;font-size:16px;cursor:pointer}
        .quick-links{display:flex;justify-content:center;align-items:center;gap:15px;margin-bottom:15px;flex-wrap:wrap}
        .quick-links a{padding:6px 16px;border-radius:15px;font-size:13px;background:rgba(255,255,255,.95);color:#64748b;text-decoration:none;transition:all .3s ease}
        .quick-links a:hover{background:#e0f2fe;color:#3b82f6}
        .quick-links span{color:#cbd5e1}
        .banner{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 20px;background:rgba(59,130,246,.08);border-radius:8px;margin-bottom:20px;color:#3b82f6;font-size:14px}
        .content{padding:0 25px 50px}
        .category-section{background:rgba(248,250,252,0.85);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #c0c4c9}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .category-title{font-size:16px;font-weight:600;color:#1e293b}
        .sites-grid{display:flex;flex-wrap:wrap;gap:12px}
        .site-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;background:#f5f7fa;text-decoration:none;color:#2d3748;transition:all .25s ease;border:1px solid #d1d5db;width:calc(100%/6 - 12px);min-width:150px}
        .site-card:hover{background:#ffffff;border-color:#94a3b8;transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.08)}
        .site-icon{width:28px;height:28px;border-radius:6px;flex-shrink:0;object-fit:cover}
        .site-info{flex:1;min-width:0}
        .site-name{display:block;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .site-desc{display:block;font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .footer{background:transparent;padding:25px;text-align:center;border-top:none}
        @media(max-width:1200px){.site-card{width:calc(100%/5 - 10px)}}
        @media(max-width:1000px){.site-card{width:calc(100%/4 - 10px)}}
        @media(max-width:800px){.site-card{width:calc(100%/3 - 10px)}}
        @media(max-width:768px){.search-input{width:350px}.sidebar{display:none}.main-content{margin-left:0}.menu-btn{display:block}.site-card{width:calc(100%/2 - 10px)}}
        @media(max-width:576px){.search-input{width:250px}.header{padding:10px 15px}.hero-section{padding:15px}.site-card{width:calc(100%/2 - 8px)}}
        body.dark-mode{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#f0f0f0}
        body.dark-mode .sidebar{background:rgba(35,35,60,.7)}
        body.dark-mode .nav-item{color:rgba(255,255,255,.7)}
        body.dark-mode .nav-item:hover{background:rgba(59,130,246,.2);color:#60a5fa}
        body.dark-mode .nav-item.active{background:rgba(59,130,246,.3);color:#93c5fd}
        body.dark-mode .logo-text{color:#60a5fa}
        body.dark-mode .theme-toggle:hover{background:rgba(255,255,255,.1)}
        body.dark-mode .quick-tabs{background:rgba(30,30,55,.4)}
        body.dark-mode .quick-tabs .tab{background:rgba(40,40,70,.5);color:rgba(255,255,255,.85)}
        body.dark-mode .quick-tabs .tab:hover,body.dark-mode .quick-tabs .tab.active{background:rgba(59,130,246,.4);color:#fff}
        body.dark-mode .search-box{background:rgba(30,30,55,.4)}
        body.dark-mode .search-input{background:rgba(40,40,70,.6);color:#f0f0f0}
        body.dark-mode .quick-links{background:rgba(30,30,55,.4)}
        body.dark-mode .quick-links a{background:rgba(40,40,70,.5);color:rgba(255,255,255,.85)}
        body.dark-mode .quick-links a:hover{background:rgba(59,130,246,.4);color:#fff}
        body.dark-mode .quick-links span{color:rgba(255,255,255,.2)}
        body.dark-mode .banner{background:rgba(35,35,60,.6);color:#60a5fa}
        body.dark-mode .category-section{background:rgba(35,35,60,.6)}
        body.dark-mode .site-card{background:rgba(45,45,75,.5);color:#f0f0f0}
        body.dark-mode .site-card:hover{background:rgba(55,55,90,.6)}
        body.dark-mode .footer{background:rgba(30,30,55,.5)}
        img.lazy{background:#e2e8f0}
        body.dark-mode img.lazy{background:rgba(45,45,75,.5)}
        .float-buttons{position:fixed;right:20px;bottom:40px;display:flex;flex-direction:column;gap:10px;z-index:999}
        .float-btn{width:44px;height:44px;border:none;border-radius:50%;font-size:18px;cursor:pointer;transition:all .3s ease;box-shadow:0 2px 10px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center}
        .float-backtop{background:#3b82f6;color:#fff}
        .float-backtop:hover{background:#2563eb;transform:translateY(-2px)}
        .float-theme{background:#fff;color:#64748b;border:1px solid #e2e8f0}
        .float-theme:hover{background:#f1f5f9;transform:translateY(-2px)}
        body.dark-mode .float-theme{background:rgba(45,45,75,.8);color:#f0f0f0;border-color:rgba(255,255,255,.1)}
        body.dark-mode .float-theme:hover{background:rgba(60,60,100,.8)}
    </style>
    <link rel="stylesheet" href="css/style.css" media="print" onload="this.media='all'">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html" target="_self">
                <img src="img/fwsm.cn.png" data-icon="fwsm.cn" alt="良家导航" onerror="if(window.tryNextImageFormat){tryNextImageFormat(this,'fwsm.cn')}else{this.src='img/imgbug.png'}">
            </a>
        </div>
        <nav class="sidebar-nav">
        </nav>
    </aside>

    <div class="main-content">
        <header class="header">
            <div class="header-left">
                <button class="menu-btn">☰</button>
                <a href="index.html" target="_self" class="logo-text">良家导航</a>
            </div>
            <nav class="header-nav">
            </nav>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        </header>

        <section class="hero-section">
            <div class="quick-tabs">
            </div>
            
            <div class="search-box">
                <form action="https://www.baidu.com/s" method="get" target="_blank">
                    <input type="text" name="wd" placeholder="百度一下" class="search-input">
                    <button type="submit" class="search-btn">🔍</button>
                </form>
            </div>
            
            <div class="quick-links">
            </div>

            <div class="banner">
            </div>
        </section>

        <main class="content">
        </main>

        <footer id="contact" class="footer">
        </footer>
    </div>

    <div class="float-buttons">
        <button class="float-btn float-backtop" onclick="scrollToTop()" title="返回顶部">↑</button>
        <button class="float-btn float-theme" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>

    <script src="js/fwsmdata.js" defer></script>
    <script src="js/script.js" defer></script>
</body>
</html>
